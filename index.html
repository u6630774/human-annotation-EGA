<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Human annotation links</title>
<style>
body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1020;color:#e2e8f0;margin:0}
.wrap{max-width:900px;margin:0 auto;padding:24px}
input{background:#0f172a;border:1px solid #24324d;color:#e2e8f0;padding:10px;border-radius:10px;width:100%}
.row{margin:14px 0} .links a{display:block;color:#60a5fa;margin:8px 0;word-break:break-all}
.small{font-size:13px;color:#94a3b8}
button{background:#60a5fa;color:#04111f;border:none;padding:10px 14px;border-radius:10px;font-weight:700;cursor:pointer}
</style></head><body><div class="wrap">
<h1>Generate annotator links</h1>
<div class="row"><label>Image base URL</label><input id="imageBase" placeholder="https://.../images"/></div>
<div class="row"><label>Google Apps Script Web App URL</label><input id="submitUrl" placeholder="https://script.google.com/macros/s/.../exec"/></div>
<div class="row"><button id="gen">Generate annotator links</button></div>
<div class="links" id="links"></div>
<div class="small">Model names are hidden. Each annotator sees 20 unique images with no duplicate image across models.</div>
</div>
<script>
const ANNOTATORS = ["annotator_01", "annotator_02", "annotator_03", "annotator_04", "annotator_05", "annotator_06", "annotator_07", "annotator_08", "annotator_09", "annotator_10"];
function enc(v){return encodeURIComponent(v||"");}
document.getElementById('gen').onclick = () => {
  const imageBase = document.getElementById('imageBase').value.trim();
  const submitUrl = document.getElementById('submitUrl').value.trim();
  const box = document.getElementById('links');
  box.innerHTML = '';
  for (const a of ANNOTATORS){
    const url = `${a}.html?imageBase=${enc(imageBase)}&submitUrl=${enc(submitUrl)}`;
    const el = document.createElement('a');
    el.href = url;
    el.textContent = a + ' → ' + url;
    el.target = '_blank';
    box.appendChild(el);
  }
};
</script></body></html>
