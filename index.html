<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Human annotation launcher</title>
<style>
body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1020;color:#e2e8f0;margin:0}
.wrap{max-width:900px;margin:0 auto;padding:28px}
.card{background:#121a2b;border:1px solid #24324d;border-radius:16px;padding:20px}
h1{margin-top:0}
input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #24324d;background:#0f172a;color:#e2e8f0;margin:6px 0 14px}
button{background:#60a5fa;color:#04111f;border:none;padding:10px 14px;border-radius:10px;font-weight:700;cursor:pointer}
ul{padding-left:20px}
li{margin:10px 0}
a{color:#93c5fd}
.small{font-size:13px;color:#94a3b8}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Human annotation launcher</h1>
    <p class="small">Fill the two fields below, then generate links for each annotator page.</p>
    <label>Image base URL</label>
    <input id="imageBase" type="text" placeholder="https://your-site.com/images"/>
    <label>Google Apps Script Web App URL</label>
    <input id="submitUrl" type="text" placeholder="https://script.google.com/macros/s/.../exec"/>
    <button id="genBtn" type="button">Generate annotator links</button>
    <h2>Annotator pages</h2>
    <ul id="linkList"><li><a href="annotator_01.html" data-page="annotator_01.html">Annotator 01</a></li>
<li><a href="annotator_02.html" data-page="annotator_02.html">Annotator 02</a></li>
<li><a href="annotator_03.html" data-page="annotator_03.html">Annotator 03</a></li>
<li><a href="annotator_04.html" data-page="annotator_04.html">Annotator 04</a></li>
<li><a href="annotator_05.html" data-page="annotator_05.html">Annotator 05</a></li>
<li><a href="annotator_06.html" data-page="annotator_06.html">Annotator 06</a></li>
<li><a href="annotator_07.html" data-page="annotator_07.html">Annotator 07</a></li>
<li><a href="annotator_08.html" data-page="annotator_08.html">Annotator 08</a></li>
<li><a href="annotator_09.html" data-page="annotator_09.html">Annotator 09</a></li>
<li><a href="annotator_10.html" data-page="annotator_10.html">Annotator 10</a></li></ul>
  </div>
</div>
<script>
document.getElementById('genBtn').addEventListener('click', () => {
  const imageBase = encodeURIComponent(document.getElementById('imageBase').value.trim());
  const submitUrl = encodeURIComponent(document.getElementById('submitUrl').value.trim());
  document.querySelectorAll('#linkList a').forEach(a => {
    const page = a.dataset.page;
    let url = page;
    const params = [];
    if(imageBase) params.push('imageBase=' + imageBase);
    if(submitUrl) params.push('submitUrl=' + submitUrl);
    if(params.length) url += '?' + params.join('&');
    a.href = url;
  });
});
</script>
</body>
</html>
