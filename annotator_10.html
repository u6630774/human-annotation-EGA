function $(sel) { return document.querySelector(sel); }
function escapeHtml(s) {
  return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}
function getQueryParam(name) {
  const u = new URL(window.location.href);
  return u.searchParams.get(name) || "";
}
function normalizeBase(base) {
  return (base || "").replace(/\/+$/, "");
}
function render() {
  const grid = $("#grid");
  const imageBase = normalizeBase($("#imageBase").value.trim());
  grid.innerHTML = "";
  for (const t of TASKS) {
    const imgSrc = imageBase ? `${imageBase}/${t.image}` : "";
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.sampleId = t.sample_id;
    card.innerHTML = `
      <div class="card-head">
        <div>
          <div><b>Task ${t.task_index}</b></div>
          <div class="badges">
            <span class="badge">image: ${escapeHtml(t.image)}</span>
            <span class="badge">sample: ${escapeHtml(t.sample_id)}</span>
          </div>
        </div>
      </div>
      <div class="content">
        <div class="preview">${imgSrc ? `<img src="${imgSrc}" alt="${escapeHtml(t.image)}" loading="lazy"/>` : `<div class="small">Set Image base URL to display image.</div>`}</div>
        <div>
          <div class="caption-box">
            <h3>Attacked caption</h3>
            <p>${escapeHtml(t.caption_adv)}</p>
          </div>
          <div class="row">
            <label class="choice"><input type="radio" name="label_${t.sample_id}" value="unsafe"/> Unsafe / Harmful</label>
            <label class="choice"><input type="radio" name="label_${t.sample_id}" value="safe"/> Not unsafe</label>
          </div>
          <textarea data-sample="${t.sample_id}" placeholder="Optional notes"></textarea>
          <details>
            <summary>Show clean caption (optional)</summary>
            <div class="caption-box" style="margin-top:10px">
              <h3>Clean caption</h3>
              <p>${escapeHtml(t.caption_clean)}</p>
            </div>
          </details>
        </div>
      </div>
    `;
    grid.appendChild(card);
  }
  restorePerTaskState();
}
function collectState() {
  const labels = {};
  const notes = {};
  for (const t of TASKS) {
    const checked = document.querySelector(`input[name="label_${t.sample_id}"]:checked`);
    if (checked) labels[t.sample_id] = checked.value;
    const ta = document.querySelector(`textarea[data-sample="${t.sample_id}"]`);
    if (ta && ta.value.trim()) notes[t.sample_id] = ta.value.trim();
  }
  return {
    imageBase: $("#imageBase").value.trim(),
    submitUrl: $("#submitUrl").value.trim(),
    labels, notes
  };
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(collectState()));
}
function restorePerTaskState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.imageBase) $("#imageBase").value = data.imageBase;
    if (data.submitUrl) $("#submitUrl").value = data.submitUrl;
    for (const [sampleId, val] of Object.entries(data.labels || {})) {
      const input = document.querySelector(`input[name="label_${sampleId}"][value="${val}"]`);
      if (input) input.checked = true;
    }
    for (const [sampleId, note] of Object.entries(data.notes || {})) {
      const ta = document.querySelector(`textarea[data-sample="${sampleId}"]`);
      if (ta) ta.value = note;
    }
  } catch(e) {}
}
function exportCSV() {
  const rows = [["annotator","task_index","sample_id","model","image","label","notes","caption_adv","caption_clean"]];
  const state = collectState();
  for (const t of TASKS) {
    rows.push([
      ANNOTATOR,
      t.task_index,
      t.sample_id,
      t.model,
      t.image,
      state.labels[t.sample_id] || "",
      state.notes[t.sample_id] || "",
      t.caption_adv,
      t.caption_clean
    ]);
  }
  const csv = rows.map(r => r.map(v => {
    const s = String(v ?? "");
    return /[",\n]/.test(s) ? '"' + s.replaceAll('"','""') + '"' : s;
  }).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${ANNOTATOR}_annotations.csv`;
  a.click();
}
async function submitAll() {
  const submitUrl = $("#submitUrl").value.trim();
  if (!submitUrl) {
    $("#status").textContent = "Please fill Apps Script URL first.";
    return;
  }
  const state = collectState();
  const payload = TASKS.map(t => ({
    submitted_at_client: new Date().toISOString(),
    annotator: ANNOTATOR,
    page_url: window.location.href,
    image_base: state.imageBase || "",
    task_index: t.task_index,
    sample_id: t.sample_id,
    model: t.model,
    image: t.image,
    label: state.labels[t.sample_id] || "",
    notes: state.notes[t.sample_id] || "",
    caption: t.caption_adv,
    clean_caption: t.caption_clean
  }));
  $("#status").textContent = "Submitting...";
  try {
    const resp = await fetch(submitUrl, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(payload)
    });
    const txt = await resp.text();
    $("#status").textContent = resp.ok ? "Submitted successfully." : ("Submit failed: " + txt);
  } catch (e) {
    $("#status").textContent = "Submit failed. You can still export CSV backup.";
  }
}
function init() {
  const imageBaseParam = getQueryParam("imageBase");
  const submitUrlParam = getQueryParam("submitUrl");
  if (imageBaseParam) $("#imageBase").value = imageBaseParam;
  if (submitUrlParam) $("#submitUrl").value = submitUrlParam;
  render();
  $("#imageBase").addEventListener("input", () => { saveState(); render(); });
  $("#submitUrl").addEventListener("input", saveState);
  document.body.addEventListener("change", (e) => { if (e.target.matches('input[type="radio"]')) saveState(); });
  document.body.addEventListener("input", (e) => { if (e.target.matches("textarea")) saveState(); });
  $("#exportBtn").addEventListener("click", exportCSV);
  $("#submitBtn").addEventListener("click", submitAll);
}
init();
</script>
